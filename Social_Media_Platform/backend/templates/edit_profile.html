{% extends 'base.html' %}

{% block content %}

<div style="
    max-width:700px;
    margin:50px auto;
    padding:20px;
">

    <div style="
        background:white;
        padding:35px;
        border-radius:20px;
        box-shadow:0 8px 25px rgba(0,0,0,0.08);
    ">

        <h1 style="
            text-align:center;
            color:#4f46e5;
            margin-bottom:30px;
        ">
            Edit Profile 👤
        </h1>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {% if profile.profile_picture %}
                <div style="text-align:center; margin-bottom:25px;">
                    <img
                        src="{{ profile.profile_picture.url }}"
                        width="130"
                        height="130"
                        style="
                            border-radius:50%;
                            object-fit:cover;
                            border:4px solid #e5e7eb;
                        "
                    >
                </div>
            {% endif %}

            <label style="
                font-weight:bold;
                color:#444;
            ">
                Profile Picture
            </label>

            <br><br>

            <input
                type="file"
                name="profile_picture"
                style="
                    width:100%;
                    padding:12px;
                    border:1px solid #ddd;
                    border-radius:12px;
                    background:#f9fafb;
                    box-sizing:border-box;
                "
            >

            <br><br><br>

            <label style="
                font-weight:bold;
                color:#444;
            ">
                Bio
            </label>

            <textarea
                name="bio"
                rows="6"
                placeholder="Tell people about yourself..."
                style="
                    width:100%;
                    padding:15px;
                    margin-top:10px;
                    border:1px solid #ddd;
                    border-radius:12px;
                    resize:none;
                    font-size:16px;
                    box-sizing:border-box;
                    outline:none;
                "
            >{{ profile.bio }}</textarea>

            <br><br>

            <button
                type="submit"
                style="
                    width:100%;
                    padding:15px;
                    border:none;
                    border-radius:12px;
                    background:#4f46e5;
                    color:white;
                    font-size:16px;
                    font-weight:bold;
                    cursor:pointer;
                "
            >
                💾 Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
